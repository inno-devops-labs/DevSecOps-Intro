name: Lab 1 Smoke Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    services:
      juice-shop:
        image: bkimminich/juice-shop:v20.0.0
        ports:
          - 3000:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Juice Shop to start
        run: |
          echo "Polling Juice Shop..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version >/dev/null; then
              echo "Juice Shop is up!"
              exit 0
            fi
            echo "Waiting for service to start... ($i/30)"
            sleep 2
          done
          echo "Juice Shop failed to start in time."
          exit 1

      - name: Verify homepage
        run: curl -I http://localhost:3000
