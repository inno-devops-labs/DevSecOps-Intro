# .github/workflows/lab1-smoke.yml
name: Smoke Test Juice Shop
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop:v20.0.0
        ports:
          - 3000:3000
        options: >-
          --health-cmd="curl --silent --fail http://localhost:3000/rest/admin/application-version || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - name: Wait for Juice Shop to be ready
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version >/dev/null; then
              echo "Juice Shop is ready!"
              exit 0
            fi
            echo "Waiting for Juice Shop... (attempt $i/30)"
            sleep 2
          done
          echo "Error: Juice Shop failed to start within 60 seconds"
          exit 1
      
      - name: Verify homepage returns 200
        run: |
          curl --silent --fail http://localhost:3000/rest/admin/application-version
          echo "smoke test passed"