name: Lab 1 — Juice Shop Smoke Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop:v20.0.0
        ports:
          - 3000:3000
    steps:
      - name: Wait for Juice Shop to be healthy
        run: |
          for i in $(seq 1 30); do
            echo "Attempt $i/30..."
            if curl --silent --fail http://localhost:3000/rest/admin/application-version; then
              echo ""
              echo "Juice Shop is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop failed to start within 60s"
          exit 1

      - name: Verify homepage returns 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          echo "Homepage HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            exit 1
          fi
          echo "Homepage OK"
