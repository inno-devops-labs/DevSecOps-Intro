name: Lab 1 — Juice Shop Smoke Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version > /dev/null; then
              echo "Juice Shop is up!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 2s..."
            sleep 2
          done
          echo "Juice Shop failed to start in time"
          docker logs juice-shop
          exit 1

      - name: Verify HTTP 200 on homepage
        run: |
          RESPONSE=$(curl --silent --write-out "HTTP %{http_code}" --output /dev/null http://localhost:3000)
          echo "Response: $RESPONSE"
          if [ "$RESPONSE" != "HTTP 200" ]; then
            echo "Expected HTTP 200, got $RESPONSE"
            exit 1
          fi
          echo "Smoke test passed — Juice Shop returned HTTP 200"

      - name: Check application version
        run: |
          curl --silent http://localhost:3000/rest/admin/application-version
