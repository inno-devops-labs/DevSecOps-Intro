name: Lab 1 Juice Shop smoke test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Juice Shop
        run: |
          docker run -d --name juice-shop -p 127.0.0.1:3000:3000 bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop and verify health
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:3000/rest/admin/application-version; then
              echo
              echo "Juice Shop is healthy"
              curl -I http://127.0.0.1:3000 | head -20
              exit 0
            fi
            sleep 2
          done

          echo "Juice Shop did not become healthy in time"
          docker logs juice-shop
          exit 1
