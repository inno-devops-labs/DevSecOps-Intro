name: Lab 1 Smoke Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:v20.0.0

      - name: Wait for service
        run: |
          for i in $(seq 1 30); do
            echo "Checking..."
            if curl --silent --fail http://localhost:3000/rest/admin/application-version; then
              echo "Service is up"
              exit 0
            fi
            sleep 2
          done
          echo "Service failed to start"
          exit 1

      - name: Final check
        run: |
          curl -i http://localhost:3000/rest/admin/application-version