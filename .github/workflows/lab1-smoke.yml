name: Lab1 Smoke Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Pull and start Juice Shop
        run: |
          docker run -d --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to be ready
        run: |
          for i in $(seq 1 30); do
            curl --silent --fail http://localhost:3000/rest/admin/application-version > /dev/null && echo "Juice Shop is up!" && exit 0
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "Juice Shop failed to start"
          exit 1

      - name: Verify HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
