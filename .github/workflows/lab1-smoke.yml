name: lab1-smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to be healthy
        run: |
          for i in $(seq 1 30); do
            curl --silent --fail http://localhost:3000/rest/admin/application-version >/dev/null && echo "Juice Shop ready" && exit 0
            sleep 2
          done
          echo "Juice Shop did not start in time" && exit 1

      - name: Verify homepage returns HTTP 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || (echo "Expected 200, got $HTTP_CODE" && exit 1)

      - name: Print version endpoint
        run: curl -s http://localhost:3000/rest/admin/application-version | jq
