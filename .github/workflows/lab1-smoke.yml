name: Lab 1 Smoke Test

on:
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      juice-shop:
        image: bkimminich/juice-shop:v16.0.0
        ports:
          - 3000:3000

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in {1..20}; do
            if curl -s -I http://localhost:3000 | grep -q "HTTP/"; then
              echo "Juice Shop is up and running!"
              exit 0
            fi
            sleep 3
          done
          echo "Juice Shop failed to start in time"
          exit 1

      - name: Log Health Check Response
        run: curl -I http://localhost:3000
