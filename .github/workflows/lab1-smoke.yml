name: Smoke Test Juice Shop
on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop:v20.0.0
        ports:
          - 3000:3000
        options: >-
          --health-cmd="curl --silent --fail http://localhost:3000/rest/admin/application-version || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl
      
      - name: Wait for ready of Juice Shop
        run: |
          echo "Waiting for Juice Shop..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version > /dev/null; then
              echo "Juice Shop is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Juice Shop not ready yet, waiting 2 seconds..."
            sleep 2
          done
          echo "Juice Shop failed to start within 60 seconds"
          exit 1
      
      - name: Verify that homepage returns 200
        run: |
          echo "Checking homepage..."
          curl -v http://localhost:3000
          
      - name: Verify API endpoint
        run: |
          echo "Checking API endpoint..."
          curl --silent --fail http://localhost:3000/api/products | jq '.status'