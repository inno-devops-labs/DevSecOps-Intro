name: Lab1 Smoke Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main, feature/** ]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop container
        run: |
          docker run -d \
            --name juice-shop \
            -p 3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version; then
              echo "Juice Shop is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Juice Shop failed to start within 60 seconds"
          exit 1

      - name: Verify homepage returns 200
        run: |
          echo "Testing homepage..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "HTTP Status Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Homepage test passed"
            curl -I http://localhost:3000/
          else
            echo "Homepage test failed with code $HTTP_CODE"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop juice-shop || true
          docker rm juice-shop || true