name: Lab 1 Smoke Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop container
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:v20.0.0
          
      - name: Wait for Juice Shop to be ready (Max 60s)
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version; then
              echo "Juice Shop is up and healthy!"
              exit 0
            fi
            echo "Attempt $i/30 failed. Waiting 2s..."
            sleep 2
          done
          echo "Juice Shop failed to start within 60s."
          exit 1
          
      - name: Verify Homepage returns HTTP 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          echo "Homepage HTTP Code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: Homepage did not return 200 OK!"
            exit 1
          fi
          echo "Smoke test passed successfully!"
