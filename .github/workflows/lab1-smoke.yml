name: Lab 1 - Smoke Test

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  smoke-test-juice-shop:
    runs-on: ubuntu-latest
    services:
      juice-shop:
        image: bkimminich/juice-shop:v20.0.0
        ports:
          - 3000:3000
    steps:
      - name: Wait for Juice Shop to become ready
        run: |
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/rest/admin/application-version > /dev/null; then
              echo "Juice Shop is up and responding!"
              exit 0
            fi
            echo "Attempt $attempt/30 - not ready yet, waiting 2s..."
            sleep 2
          done
          echo "ERROR: Juice Shop failed to start within 60 seconds"
          exit 1

      - name: Check homepage returns HTTP 200
        run: |
          curl -I http://localhost:3000
