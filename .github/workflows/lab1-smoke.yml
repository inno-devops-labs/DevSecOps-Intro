1name: Lab 1 Juice Shop Smoke Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Juice Shop
        run: |
          docker run -d --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0
      - name: Wait for Juice Shop
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:3000/rest/admin/application-version >/dev/null; then
              echo "Juice Shop is ready after $((i * 2)) seconds"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop did not become ready within 60 seconds"
          docker logs juice-shop
          exit 1
      - name: Verify homepage
        run: |
          http_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3000)"
          echo "Homepage HTTP status: ${http_status}"
          test "${http_status}" = "200"
      - name: Capture version response
        run: |
          curl --include --silent --fail http://127.0.0.1:3000/rest/admin/application-version
