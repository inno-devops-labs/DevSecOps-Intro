name: Lab 1 — Juice Shop Smoke Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Juice Shop image
        run: docker pull bkimminich/juice-shop:v20.0.0

      - name: Start Juice Shop container
        run: |
          docker run -d --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:3000/rest/admin/application-version; then
              echo "Juice Shop is ready after attempt $i"
              exit 0
            fi
            echo "Attempt $i: not ready yet, sleeping 2s..."
            sleep 2
          done
          echo "Juice Shop did not become healthy within 60 seconds"
          docker logs juice-shop
          exit 1

      - name: Verify homepage returns HTTP 200
        run: |
          curl --silent --show-error --fail --output /dev/null \
            --write-out "HTTP %{http_code}\n" http://127.0.0.1:3000

      - name: Stop container
        if: always()
        run: docker rm -f juice-shop
