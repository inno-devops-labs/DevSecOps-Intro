services:
  juice:
    image: bkimminich/juice-shop:v19.0.0
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - juice
    # Host ports stay at the lab defaults unless a local conflict requires an override.
    ports:
      - "${LAB11_HTTP_PORT:-8080}:8080"   # HTTP (will redirect to HTTPS)
      - "${LAB11_HTTPS_PORT:-8443}:8443"   # HTTPS
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./reverse-proxy/certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx:rw
