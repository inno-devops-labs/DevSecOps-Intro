user  nginx;
worker_processes  auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  10;
  server_tokens off;
  gzip off;

  # Security-focused logs
  log_format security '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct=$upstream_connect_time '
                     'urt=$upstream_response_time';
  access_log /var/log/nginx/access.log security;
  error_log  /var/log/nginx/error.log warn;

  # Connection limit
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # Upstream app
  upstream juice {
    server juice:3000;
    keepalive 32;
  }

  # Rate limit zone for login
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_status 429;

  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  # Common proxy settings
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Connection $connection_upgrade;
  proxy_set_header Upgrade $http_upgrade;
  # Prevent upstream TLS BREACH vector by disabling compression from upstream
  proxy_set_header Accept-Encoding "";
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;
  proxy_connect_timeout 5s;
  # Client timeouts
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 10s;
  proxy_hide_header X-Powered-By;
  # Hide upstream headers to avoid duplicates and enforce policy at the proxy
  proxy_hide_header X-Frame-Options;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header Permissions-Policy;
  proxy_hide_header Cross-Origin-Opener-Policy;
  proxy_hide_header Cross-Origin-Resource-Policy;
  proxy_hide_header Content-Security-Policy;
  proxy_hide_header Content-Security-Policy-Report-Only;
  proxy_hide_header Access-Control-Allow-Origin;

  # HTTP server (redirect to HTTPS)
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Core headers (also on redirects)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    return 308 https://$host$request_uri;
  }

  # HTTPS server TLS 1.3 only
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # SSL certificates
    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # TLS 1.3 ONLY
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Moder ciphers
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_ecdh_curve X25519:secp384r1;

    # SSL session keys and tickets
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Connection limit
    limit_conn conn 50;
    # Client timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Security header (always)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    client_max_body_size 2m;

    # Rate-limited login
    location = /rest/user/login {
      limit_req zone=login burst=5 nodelay;
      limit_req_log_level warn;
      proxy_pass http://juice;
    }

    # Everything else
    location / {
      proxy_pass http://juice;
    }
  }
}