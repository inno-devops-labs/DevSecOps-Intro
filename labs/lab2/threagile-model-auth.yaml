        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: ["authenticated"]
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - access-token
        data_assets_received:
          - auth-session
