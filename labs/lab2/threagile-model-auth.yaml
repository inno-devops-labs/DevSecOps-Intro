threagile_version: 1.0.0

title: Juice Shop Authentication & Authorization Threat Model
date: 2025-09-18

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Detailed threat analysis of the Juice Shop login flow, token lifecycle,
  protected endpoint access, and admin privilege enforcement.

business_criticality: critical

business_overview:
  description: >
    End users submit login credentials, obtain a signed JWT, and use it to
    access both standard user endpoints and privileged admin functionality.
  images: []

technical_overview:
  description: >
    The client transmits credentials to the Login Service over an encrypted
    channel. After validation against the identity store, the Login Service
    requests token generation from the JWT Issuer. Every protected route,
    including admin operations, validates the token through the Issuer before
    processing the request. Admin routes additionally verify the role claim
    server-side.
  images: []

questions:
  Are password hashes using bcrypt/scrypt/argon2?: ""
  Is the token signing key stored separately from the application?: ""
  Does every admin endpoint perform a server-side role check?: ""
  Are failed login attempts logged and throttled?: ""

abuse_cases:
  Brute-Force Login: >
    Automated credential guessing using common password lists against known usernames.
  Signing Key Theft: >
    Extraction or exfiltration of the JWT secret enables crafting tokens with arbitrary claims.
  Privilege Escalation via Role Tampering: >
    A standard user modifies the token payload or accesses admin routes lacking proper authorization checks.

security_requirements:
  Credential storage: Hash all passwords with a strong, salted algorithm before persistence.
  Brute-force protection: Implement account lockout, rate limiting, and optional MFA for privileged accounts.
  Token hardening: Enforce strict algorithm checking, audience/issuer validation, and short expiration windows.
  Key management: Keep signing material in a secrets manager; rotate on a defined schedule.
  Admin enforcement: Validate the admin role claim on every privileged request at the server.
  Transport security: Mandate HTTPS for all authentication and token-bearing traffic.

tags_available:
  - login
  - token
  - identity
  - administrator
  - client
  - endpoint
  - storage
  - crypto
  - authenticated

data_assets:
  Login Credentials:
    id: login-credentials
    description: "Username-password pair provided at login or account creation."
    usage: business
    tags: ["login", "identity"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Leaked credentials grant unauthorized access; tampered credentials subvert authentication.

  Access Token:
    id: access-token
    description: "Cryptographically signed JWT encoding user identity, privileges, and validity window."
    usage: business
    tags: ["login", "token"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Token integrity underpins all authorization decisions; forged tokens bypass access controls.

  Auth Session:
    id: auth-session
    description: "Server-side record of active authentication and token revocation status."
    usage: business
    tags: ["login"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Corrupted session state enables session fixation or revocation bypass.

  Admin Commands:
    id: admin-commands
    description: "Requests that alter users, inventory, or system configuration."
    usage: business
    tags: ["administrator"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Unauthorized admin operations compromise the entire application and its data.

  Signing Secret:
    id: signing-secret
    description: "Private key material for JWT signature creation and verification."
    usage: business
    tags: ["login", "token", "crypto"]
    origin: application
    owner: Lab Owner
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Disclosure or modification of the signing secret enables arbitrary token forgery.

