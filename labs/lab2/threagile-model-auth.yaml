threagile_version: 1.0.0

title: Juice Shop Authentication Flow
date: 2026-06-12

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Focused threat model of Juice Shop authentication flow:
  login → JWT issuance → session validation → admin access control.
  Built from scratch for Lab 2 Bonus Task.

business_criticality: critical

business_overview:
  description: >
    Auth-only view of Juice Shop. Covers login/register, JWT signing/verification,
    session state, and admin endpoint access control.
  images: []

technical_overview:
  description: >
    Browser → Auth API → Token Signer → User DB. JWT returned to browser.
    Subsequent requests carry JWT to Auth API and Admin API.
  images: []

questions:
  Is JWT signed with a strong secret?: "Yes"
  Are admin endpoints protected by role checks?: "Yes"
  Is session state stored server-side?: "Yes"

abuse_cases:
  Credential Stuffing: >
    Attackers brute-force login endpoint with leaked password lists.
  JWT Token Forgery: >
    Attacker forges JWT if signing key is weak or algorithm is 'none'.
  Privilege Escalation: >
    Regular user accesses admin endpoints by tampering with JWT role claim.

security_requirements:
  Strong JWT signing: Use HS256 or RS256 with key length ≥ 256 bits.
  Role enforcement: Admin endpoints must verify admin role claim independently.
  Rate limiting: Login endpoint must be rate-limited to prevent brute force.
  Session expiry: JWT must expire within 15 minutes; refresh token rotation required.

tags_available:
  - browser
  - auth
  - jwt
  - session
  - admin
  - credentials
  - tokens
  - datastore

data_assets:

  Credentials:
    id: credentials
    description: "Username + bcrypt password hash."
    usage: business
    tags: ["auth", "credentials"]
    origin: user-supplied
    owner: User
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      Authentication secrets; breach leads to account takeover.

  JWT Token:
    id: jwt-token
    description: "Signed JWT access token containing user ID and role claim."
    usage: business
    tags: ["tokens", "auth"]
    origin: application
    owner: System
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      Token compromise allows session hijacking and privilege escalation.

  Session State:
    id: session-state
    description: "Server-side session metadata (Redis or in-memory)."
    usage: business
    tags: ["session"]
    origin: application
    owner: System
    quantity: many
    confidentiality: internal
    integrity: important
    availability: operational
    justification_cia_rating: >
      Used for session validation and revocation.

  Admin Operations:
    id: admin-operations
    description: "Admin action requests (delete user, view feedback, change roles)."
    usage: business
    tags: ["admin"]
    origin: user-supplied
    owner: Admin User
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      High-impact operations requiring strict authorization.

  Signing Key:
    id: signing-key
    description: "JWT HMAC secret or RSA private key used for token signing."
    usage: business
    tags: ["tokens"]
    origin: application
    owner: System
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Key compromise allows universal token forgery.

