threagile_version: 1.0.0

title: Juice Shop — Authentication Flow Threat Model
date: 2025-09-18

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Focused threat model of the Juice Shop authentication flow:
  login, JWT issuance, session use on protected endpoints, and admin
  privilege escalation. This model deliberately omits non-auth assets
  (product catalog, orders) to surface auth-specific risks that a
  full-architecture model masks.

business_criticality: critical

business_overview:
  description: >
    Authentication is the primary security control in Juice Shop.
    Weaknesses here (weak JWT signing, missing brute-force protection,
    broken admin authorization) directly enable account takeover and
    privilege escalation.

technical_overview:
  description: >
    A browser submits credentials to the Auth API, which validates them
    against the User Credential Store and requests a signed JWT from the
    Token Signer. The browser then presents that JWT on every subsequent
    request. The Admin Endpoint additionally verifies that the JWT carries
    an admin role claim before serving privileged operations.

questions: {}
abuse_cases:
  Brute-Force Login: >
    Attacker submits thousands of credential pairs against the login endpoint
    to guess a valid password.
  JWT Algorithm Confusion: >
    Attacker forges a JWT by exploiting a weak or mis-configured signing
    algorithm (e.g. alg:none or RS256→HS256 confusion).
  Privilege Escalation via Tampered JWT: >
    Attacker modifies the role claim in a JWT to gain admin access.
  Session Fixation: >
    Attacker plants a known session token before login and hijacks the
    authenticated session afterwards.

security_requirements:
  Strong JWT signing: Use RS256 or ES256; never accept alg:none.
  Rate limiting on login: Lock account or add CAPTCHA after N failed attempts.
  Admin role server-side check: Verify role claim on every admin request server-side.
  Short-lived tokens: JWT expiry ≤ 15 minutes; use refresh-token rotation.
  Secrets in vault: JWT signing keys must not appear in source code or logs.

tags_available:
  - browser
  - auth
  - jwt
  - admin
  - credentials
  - session
  - token
  - internal
  - external

# =========================
# DATA ASSETS
# =========================
data_assets:

  Credentials:
    id: credentials
    description: "Username and password submitted at login."
    usage: business
    tags: ["auth", "credentials"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Plaintext credentials in transit must be strictly protected;
      compromise allows immediate account takeover.

  JWT Token:
    id: jwt-token
    description: "Signed JWT issued after successful login, carries user identity and role claims."
    usage: business
    tags: ["auth", "jwt", "token"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      A forged or tampered JWT bypasses all authorization checks.
      Integrity is therefore critical.

  JWT Signing Key:
    id: jwt-signing-key
    description: "Secret or private key used to sign and verify JWTs."
    usage: devops
    tags: ["auth", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Exposure of the signing key allows an attacker to forge arbitrary
      tokens with any identity or role.

  User Session State:
    id: user-session-state
    description: "Server-side or client-side session state tracking authenticated users."
    usage: business
    tags: ["session", "auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      Session fixation or hijack gives an attacker full user-level access.

  Admin Operation Request:
    id: admin-operation-request
    description: "Privileged requests to admin endpoints (user management, config changes)."
    usage: business
    tags: ["admin", "auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: few
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Admin operations can modify all application data; integrity is critical
      to prevent privilege escalation abuse.

# =========================
# TECHNICAL ASSETS
# =========================
technical_assets:

  Browser:
    id: browser
    description: "End-user web browser initiating login and authenticated requests."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["browser", "external"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client controlled by end user; potentially an attacker."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
      - jwt-token
      - user-session-state
      - admin-operation-request
    data_assets_stored:
      - jwt-token
      - user-session-state
    data_formats_accepted:
      - json
    communication_links:
      Login Request:
        target: auth-api
        description: "Browser POSTs credentials to /rest/user/login over HTTPS."
        protocol: https
        authentication: credentials
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token
      Authenticated API Request:
        target: auth-api
        description: "Browser sends JWT in Authorization header for protected endpoints."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - user-session-state
        data_assets_received: []
      Admin Request:
        target: admin-endpoint
        description: "Browser sends JWT with admin role claim to admin endpoints."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: ["admin"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - admin-operation-request
        data_assets_received: []

  Auth API:
    id: auth-api
    description: "Juice Shop authentication endpoint (/rest/user/login, /rest/user/register). Validates credentials and orchestrates JWT issuance."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-service-rest
    tags: ["auth", "internal"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: >
      Central authentication logic; compromise here breaks all access control.
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
      - user-session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Validate Credentials:
        target: user-credential-store
        description: "Auth API queries the credential store to verify submitted username/password hash."
        protocol: jdbc
        authentication: credentials
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - credentials
      Request JWT:
        target: token-signer
        description: "Auth API asks the Token Signer to issue a signed JWT after successful credential validation."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - user-session-state
        data_assets_received:
          - jwt-token

  Token Signer:
    id: token-signer
    description: "Component responsible for signing and verifying JWTs using the signing key."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["jwt", "auth", "internal"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: >
      Holds the JWT signing key; compromise allows forging of arbitrary tokens.
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - jwt-signing-key
    data_assets_stored:
      - jwt-signing-key
    data_formats_accepted:
      - json
    communication_links: {}

  User Credential Store:
    id: user-credential-store
    description: "SQLite database storing hashed passwords and user profile data."
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: database
    tags: ["auth", "internal"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Contains password hashes; direct access enables offline cracking
      and full account compromise.
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
    data_assets_stored:
      - credentials
    data_formats_accepted:
      - file
    communication_links: {}

  Admin Endpoint:
    id: admin-endpoint
    description: "Privileged admin routes (e.g. /administration, /#/administration). Requires JWT with admin role claim."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["admin", "auth", "internal"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: >
      Admin operations affect all users and application data;
      broken authorization here is a critical elevation-of-privilege risk.
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - admin-operation-request
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify JWT:
        target: token-signer
        description: "Admin endpoint calls Token Signer to verify JWT signature and role claim before serving request."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - jwt-token

# =========================
# TRUST BOUNDARIES
# =========================
trust_boundaries:

  Internet:
    id: internet-auth
    description: "Untrusted public network (browsers and attackers)."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - browser
    trust_boundaries_nested:
      - container-auth

  Container Network (Auth):
    id: container-auth
    description: "Docker container network hosting auth components."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-signer
      - user-credential-store
      - admin-endpoint
    trust_boundaries_nested: []

# =========================
# SHARED RUNTIMES
# =========================
shared_runtimes:
  Auth Container Runtime:
    id: auth-runtime
    description: "Docker engine running all auth-flow containers."
    tags: []
    technical_assets_running:
      - auth-api
      - token-signer
      - user-credential-store
      - admin-endpoint

individual_risk_categories: {}
risk_tracking: {}
