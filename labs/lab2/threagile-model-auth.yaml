threagile_version: 1.0.0

title: OWASP Juice Shop — Auth Flow Threat Model
date: 2026-06-05

author:
  name: prudenz1
  homepage: https://github.com/prudenz1

management_summary_comment: >
  Focused threat model for Juice Shop authentication: login/register, JWT issuance,
  token verification on protected routes, and admin-only endpoints.

business_criticality: important

business_overview:
  description: >
    Minimal auth-flow model for OWASP Juice Shop v20 running locally. Covers
    credential submission, JWT signing, session token use, and admin elevation checks.
  images: []

technical_overview:
  description: >
    The browser posts credentials to the Auth API. On success the Auth API reads
    password hashes from the credential store and asks the JWT service to sign a token.
    Subsequent API calls and admin operations include the JWT in the Authorization header;
    the JWT service verifies signature, expiry, and role claims before admin handlers run.
  images: []

questions:
  Are JWT signing keys rotated?: ""
  Is brute-force protection enabled on login?: ""

abuse_cases:
  Credential Stuffing: >
    Attackers automate login attempts using leaked username/password pairs.
  JWT Tampering: >
    Attackers modify JWT payload claims (e.g., role=admin) and replay tokens.
  Session Hijack: >
    Stolen JWT or session material from browser storage enables impersonation.

security_requirements:
  Strong password hashing: Store only slow password hashes (bcrypt/scrypt) in the credential store.
  JWT hardening: Use strong signing keys, short TTL, and validate alg/claims on every protected request.
  Admin AuthZ: Enforce server-side role checks on all admin routes independent of client UI hiding.

