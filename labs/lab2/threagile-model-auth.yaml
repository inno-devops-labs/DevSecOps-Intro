threagile_version: 1.0.0

title: OWASP Juice Shop — Authentication Flow Threat Model
date: 2025-09-18

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Focused threat model for the Juice Shop login, JWT issuance, protected API,
  and administrator authorization flow.

business_criticality: critical

business_overview:
  description: >
    Users authenticate with credentials, receive a signed JWT, and present it
    when accessing protected user and administrator endpoints.
  images: []

technical_overview:
  description: >
    The browser sends credentials to the Auth API over HTTPS. The Auth API
    checks the credential store and requests a JWT from the Token Signer.
    Protected and administrator endpoints verify every JWT with the signer;
    the administrator endpoint additionally requires the admin role claim.
  images: []

questions:
  Are passwords hashed with a modern password hashing function?: ""
  Are JWT signing keys rotated and stored in a vault?: ""
  Is the admin role checked server-side on every request?: ""
  Are login attempts rate limited and monitored?: ""

abuse_cases:
  Credential Stuffing: >
    An attacker automates login attempts using leaked username and password pairs.
  JWT Forgery: >
    An attacker steals or guesses the signing key and creates a token containing an admin role.
  Broken Role Authorization: >
    A valid non-admin user manipulates token claims or calls an admin endpoint that fails to enforce the role.

security_requirements:
  Password protection: Store passwords using a modern salted password hash.
  Login protection: Apply rate limiting, lockouts, and MFA for sensitive accounts.
  JWT validation: Verify signature, issuer, audience, expiry, and algorithm on every protected request.
  Signing key protection: Store signing keys in a vault and rotate them regularly.
  Admin authorization: Enforce the admin role server-side on every administrator operation.
  TLS: Encrypt all authentication and token traffic in transit.

tags_available:
  - auth
  - jwt
  - credentials
  - admin
  - browser
  - api
  - database
  - signing
  - protected

data_assets:

  Credentials:
    id: credentials
    description: "Username and password supplied during login or registration."
    usage: business
    tags: ["auth", "credentials"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Disclosure enables account takeover and modification can redirect authentication.

  JWT Token:
    id: jwt-token
    description: "Signed JWT containing user identity, role, issue time, and expiry."
    usage: business
    tags: ["auth", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Token integrity is critical because authorization decisions depend on its claims.

  Session State:
    id: session-state
    description: "Server-side authentication and token revocation state."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Session corruption can permit hijacking or bypass revocation.

  Admin Operation Requests:
    id: admin-operations
    description: "Privileged requests that modify users, products, and application state."
    usage: business
    tags: ["admin"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Unauthorized or modified admin operations can compromise the entire application.

  JWT Signing Key:
    id: jwt-signing-key
    description: "Secret key used to sign and verify JWT tokens."
    usage: business
    tags: ["auth", "jwt", "signing"]
    origin: application
    owner: Lab Owner
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Key disclosure or tampering permits forged administrator tokens.

