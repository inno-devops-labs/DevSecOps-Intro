threagile_version: 1.0.0

title: Juice Shop Auth Flow Threat Model
date: 2025-09-18

author:
  name: Pavel Troshkin
  homepage: https://github.com/Troshkins

management_summary_comment: >
  Focused threat model for Juice Shop authentication: login, JWT issuing,
  JWT verification, session handling, and admin endpoint access.

business_criticality: important

business_overview:
  description: >
    This model covers only the authentication flow, not the whole Juice Shop architecture.
  images: []

technical_overview:
  description: >
    The browser sends credentials to the Auth API. The Auth API validates credentials
    against the user store and requests a JWT from the token service. Later the browser
    sends the JWT to an admin endpoint, which verifies the token and admin role.
  images: []

questions:
  MFA enabled?: ""
  JWT keys protected?: ""
  Admin role checked?: ""
  Login rate limited?: ""

abuse_cases:
  Token theft: >
    An attacker steals a JWT and reuses it to access protected endpoints.
  JWT forgery: >
    An attacker forges or modifies a JWT to impersonate an admin.
  Admin bypass: >
    A normal user tries to access admin endpoints without the admin role.

security_requirements:
  Server-side role checks: Admin access must be checked on the backend.
  JWT key protection: JWT signing keys must be stored securely.
  MFA for admins: Admin users should use a second authentication factor.
  Rate limiting: Login endpoints should be rate-limited.

tags_available:
  - auth
  - jwt
  - admin
  - secret
  - browser
  - api
  - datastore

data_assets:

  Credentials:
    id: credentials
    description: "Username and password used for login."
    usage: business
    tags: ["auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Credentials are sensitive and can lead to account takeover."

  JWT Token:
    id: jwt-token
    description: "JWT returned after login and used in Authorization headers."
    usage: business
    tags: ["auth", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "JWTs prove identity and must not be stolen or modified."

  Session State:
    id: session-state
    description: "Authentication/session state after successful login."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: "Session state controls authenticated access."

  Admin Request:
    id: admin-request
    description: "Privileged request sent to admin-only endpoints."
    usage: business
    tags: ["admin"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Admin requests can modify sensitive application state."

  JWT Signing Key:
    id: jwt-key
    description: "Secret key used to sign and verify JWTs."
    usage: business
    tags: ["secret", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: few
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "If the key leaks, attackers can forge valid JWTs."

technical_assets:

  Browser:
    id: browser
    description: "User browser."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["browser"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "The browser is outside our trust boundary."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
      - jwt-token
      - session-state
      - admin-request
    data_assets_stored:
      - jwt-token
      - session-state
    data_formats_accepted:
      - json
    communication_links:
      Login to Auth API:
        target: auth-api
        description: "Browser sends login credentials to the Auth API."
        protocol: https
        authentication: none
        authorization: none
        tags: ["auth"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token
          - session-state

      Admin call with JWT:
        target: admin-api
        description: "Browser calls an admin endpoint with a JWT."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: ["admin", "jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - admin-request
        data_assets_received:
          - admin-request

  Auth API:
    id: auth-api
    description: "Login/register API."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-service-rest
    tags: ["api", "auth"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "The Auth API processes credentials and creates sessions."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
      - session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Check credentials:
        target: user-store
        description: "Auth API checks credentials in the user credential store."
        protocol: jdbc-encrypted
        authentication: credentials
        authorization: technical-user
        tags: ["auth"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - credentials

      Issue JWT:
        target: token-service
        description: "Auth API requests a signed JWT."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: ["jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - session-state
        data_assets_received:
          - jwt-token

  Token Service:
    id: token-service
    description: "Component that signs and verifies JWTs."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["jwt", "secret"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "This component controls JWT integrity."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - jwt-key
    data_assets_stored:
      - jwt-key
    data_formats_accepted:
      - json
    communication_links: {}

  User Store:
    id: user-store
    description: "Database with user credentials and roles."
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: database
    tags: ["datastore", "auth"]
    internet: false
    machine: container
    encryption: data-with-symmetric-shared-key
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "The store contains credentials and authorization data."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
    data_assets_stored:
      - credentials
    data_formats_accepted:
      - json
    communication_links: {}

  Admin API:
    id: admin-api
    description: "Admin-only endpoint."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["api", "admin"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Unauthorized access gives elevated privileges."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - admin-request
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify JWT:
        target: token-service
        description: "Admin API verifies JWT signature and admin role."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: ["jwt", "admin"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - jwt-token

trust_boundaries:

  Internet:
    id: internet
    description: "Untrusted user network."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - browser
    trust_boundaries_nested:
      - container-network

  Container Network:
    id: container-network
    description: "Internal container network."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-service
      - user-store
      - admin-api
    trust_boundaries_nested: []

shared_runtimes:

  Auth Runtime:
    id: auth-runtime
    description: "Container runtime for auth components."
    tags: []
    technical_assets_running:
      - auth-api
      - token-service
      - admin-api

individual_risk_categories: {}

risk_tracking: {}
