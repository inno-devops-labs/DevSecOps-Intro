threagile_version: 1.0.0

title: Juice Shop — Auth Flow Model
date: 2026-06-10

author:
  name: Student Name

management_summary_comment: >
  Focused threat model for the authentication flow: login -> JWT issuance -> protected API.

business_criticality: important

tags_available:
  - auth
  - tokens
  - pii
  - actor
  - user
  - app
  - public
  - direct
  - storage

data_assets:
  Credentials:
    id: credentials
    description: "Username and password provided by user."
    usage: business
    confidentiality: confidential
    integrity: important
    availability: important
    quantity: many

  JWT Token:
    id: jwt-token
    description: "Signed JWT used for authentication."
    usage: business
    confidentiality: confidential
    integrity: critical
    availability: important
    quantity: many

  User Session:
    id: user-session
    description: "Server-side session state or session identifiers."
    usage: business
    confidentiality: confidential
    integrity: important
    availability: important
    quantity: many

technical_assets:
  User Browser:
    id: user-browser
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    size: system
    technology: browser
    tags: ["actor", "user"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client controlled by end user (potentially an attacker)."
    communication_links:
      To Auth API:
        target: auth-api
        description: "Browser to Auth API (login/register)."
        protocol: https
        usage: business
        authentication: session-id
        authorization: enduser-identity-propagation
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token

  Auth API:
    id: auth-api
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: application
    technology: web-service-rest
    tags: ["app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Application service handling authentication requests."
    data_assets_processed:
      - credentials
      - jwt-token
    communication_links:
      To Token Signer:
        target: token-signer
        description: "Request signing of JWT."
        protocol: https
        usage: business
        authentication: none
        authorization: none
        data_assets_sent:
          - jwt-token
      To User DB:
        target: user-db
        description: "Validate credentials; uses prepared statements."
        protocol: jdbc-encrypted
        usage: business
        authentication: none
        authorization: none
        data_assets_sent:
          - credentials

  Token Signer:
    id: token-signer
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: component
    technology: web-service-rest
    tags: ["auth"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Signs tokens used for authentication."
    data_assets_processed:
      - jwt-token
    communication_links: {}

  User DB:
    id: user-db
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: system
    technology: file-server
    tags: ["storage"]
    internet: false
    machine: virtual
    encryption: data-with-symmetric-shared-key
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Stores credential hashes and session state; encrypted at rest."
    data_assets_stored:
      - credentials
      - user-session
    communication_links: {}

  Admin Endpoint:
    id: admin-endpoint
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: application
    technology: web-service-rest
    tags: ["app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Admin API requiring elevated permissions."
    communication_links:
      From Browser:
        target: admin-endpoint
        description: "Protected admin API requiring JWT with admin role."
        protocol: https
        usage: business
        authentication: session-id
        authorization: enduser-identity-propagation
        data_assets_received:
          - jwt-token

trust_boundaries:
  Internet:
    id: internet
    description: "Untrusted public network (Internet)."
    type: network-dedicated-hoster
    technical_assets_inside:
      - user-browser
    trust_boundaries_nested:
      - host

  Host:
    id: host
    description: "Local host machine / VM running the Docker environment."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-signer
      - user-db
      - admin-endpoint
    trust_boundaries_nested:
      - container-network

  Container Network:
    id: container-network
    description: "Docker container network (isolated internal network for containers)."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside: []
    trust_boundaries_nested: []
