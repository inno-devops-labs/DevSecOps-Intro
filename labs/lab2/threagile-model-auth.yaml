    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - login-credentials
      - access-token
      - admin-commands
    data_assets_stored:
      - access-token
    data_formats_accepted:
      - json
    communication_links:
      Authenticate:
        target: login-service
        description: "Send credentials via HTTPS and receive a signed JWT in response."
        protocol: https
        authentication: credentials
        authorization: enduser-identity-propagation
        tags: ["login"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
