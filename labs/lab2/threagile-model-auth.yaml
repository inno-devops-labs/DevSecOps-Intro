threagile_version: 1.0.0

title: OWASP Juice Shop - Auth Flow Threat Model
date: 2026-06-10

author:
  name: Walkerino
  homepage: https://github.com/Walkerino

management_summary_comment: >
  Focused model for the Juice Shop authentication flow: browser login, credential
  validation, JWT issuance, JWT verification, and admin endpoint access.

business_criticality: important

business_overview:
  description: >
    This model narrows the architecture to the authentication and authorization
    path. It intentionally excludes catalog and order flows so that token,
    credential, and admin authorization risks are easier to see.
  images: []

technical_overview:
  description: >
    A browser sends credentials to an auth API. The auth API validates them
    against a credential store and asks a token component to issue a JWT.
    Later requests carry the JWT to protected endpoints, including an admin
    endpoint that must verify the token and enforce the admin role.
  images: []

questions:
  Are JWT signing keys stored outside source control?: ""
  Are admin routes protected by server-side role checks?: ""

abuse_cases:
  Token replay: >
    An attacker steals a JWT and reuses it against protected endpoints.
  Privilege escalation: >
    A normal user tampers with a token or request to reach admin operations.
  Credential stuffing: >
    An attacker automates login attempts against the authentication endpoint.

security_requirements:
  Strong authentication: Enforce MFA or equivalent hardening for privileged accounts.
  JWT integrity: Sign tokens with strong keys and verify signature, issuer, audience, expiry, and role claims on every protected request.
  Credential protection: Store password hashes and signing keys in protected storage and never log credentials or tokens.
  Admin authorization: Require server-side role checks on every admin endpoint.
  Login rate limits: Rate-limit login and registration flows to reduce credential stuffing.

tags_available:
  - auth
  - jwt
  - admin
  - pii
  - secret
  - browser
  - api
  - datastore

data_assets:

  Credentials:
    id: credentials
    description: "Username and password submitted during login or registration."
    usage: business
    tags: ["auth", "pii"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Credential exposure or tampering directly enables account takeover."

  JWT Token:
    id: jwt-token
    description: "Signed JWT returned to the browser and used on protected requests."
    usage: business
    tags: ["auth", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "JWTs authorize users; integrity and confidentiality are required to prevent replay and privilege escalation."

  User Session State:
    id: user-session-state
    description: "Current user identity, roles, and session metadata derived from token claims."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Session state controls what the user can do after login."

  Admin Operation Requests:
    id: admin-operation-requests
    description: "Requests to protected administrative APIs."
    usage: business
    tags: ["admin"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: restricted
    integrity: critical
    availability: important
    justification_cia_rating: "Admin operations can change application state and must not be spoofed or tampered with."

  JWT Signing Key:
    id: jwt-signing-key
    description: "Secret key material used to sign and verify JWTs."
    usage: devops
    tags: ["secret", "jwt"]
    origin: application
    owner: Lab Owner
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Compromise of the signing key lets an attacker mint valid tokens."

technical_assets:

  Browser:
    id: auth-browser
    description: "End-user browser that submits login requests and stores the JWT."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["browser"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "The browser is user-controlled and can be attacker-controlled."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
      - jwt-token
      - admin-operation-requests
    data_assets_stored:
      - jwt-token
    data_formats_accepted:
      - json
    communication_links:
      Login and Register:
        target: auth-api
        description: "Browser submits credentials to login/register endpoint over HTTPS."
        protocol: https
        authentication: credentials
        authorization: none
        tags: ["auth"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token
      Protected API With JWT:
        target: auth-api
        description: "Browser calls protected API endpoints with JWT in the Authorization header."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: ["jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - user-session-state
      Admin Request With JWT:
        target: admin-endpoint
        description: "Browser calls admin endpoint with JWT; token must include an admin role claim."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: ["admin", "jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - admin-operation-requests
        data_assets_received:
          - admin-operation-requests

  Auth API Endpoint:
    id: auth-api
    description: "Juice Shop login/register API and general protected API gateway."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-service-rest
    tags: ["api", "auth"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Central authentication component for the application."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
      - user-session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Validate Credentials:
        target: credential-store
        description: "Auth API validates submitted credentials against stored password hashes."
        protocol: jdbc
        authentication: credentials
        authorization: technical-user
        tags: ["auth", "datastore"]
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - user-session-state
      Request JWT:
        target: token-service
        description: "Auth API asks token service to issue a signed JWT after successful login."
        protocol: in-process-library-call
        authentication: token
        authorization: technical-user
        tags: ["jwt"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - user-session-state
        data_assets_received:
          - jwt-token

  Token Signing and Verification:
    id: token-service
    description: "Component that signs new JWTs and verifies JWT signatures and claims."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: library
    tags: ["jwt", "secret"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: restricted
    integrity: critical
    availability: important
    justification_cia_rating: "JWT signing and verification determines whether protected requests are trusted."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - jwt-signing-key
      - user-session-state
    data_assets_stored:
      - jwt-signing-key
    data_formats_accepted:
      - json
    communication_links: {}

  User DB Credential Store:
    id: credential-store
    description: "Database table containing user records, password hashes, roles, and session metadata."
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: database
    tags: ["datastore", "auth"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Credential store contains authentication and authorization records."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored:
      - credentials
      - user-session-state
    data_formats_accepted:
      - json
    communication_links: {}

  Admin Endpoint:
    id: admin-endpoint
    description: "Protected admin API that must verify JWT signature and admin role on every request."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-service-rest
    tags: ["admin", "api"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: restricted
    integrity: critical
    availability: important
    justification_cia_rating: "Admin endpoint can perform sensitive operations."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - user-session-state
      - admin-operation-requests
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify JWT:
        target: token-service
        description: "Admin endpoint verifies JWT signature, expiration, and role claims before executing privileged operation."
        protocol: in-process-library-call
        authentication: token
        authorization: technical-user
        tags: ["jwt", "admin"]
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - user-session-state
      Load User Role:
        target: credential-store
        description: "Admin endpoint loads current user role and authorization metadata from credential store."
        protocol: jdbc
        authentication: credentials
        authorization: technical-user
        tags: ["admin", "datastore"]
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - user-session-state

trust_boundaries:

  Internet:
    id: auth-internet
    description: "Untrusted user network."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-browser
    trust_boundaries_nested:
      - auth-container

  Auth Container:
    id: auth-container
    description: "Juice Shop container runtime for auth APIs and storage."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-service
      - credential-store
      - admin-endpoint
    trust_boundaries_nested: []

shared_runtimes:

  Juice Shop Container:
    id: juice-auth-runtime
    description: "Single container runtime hosting auth API, admin API, token component, and local DB."
    tags: ["auth"]
    technical_assets_running:
      - auth-api
      - token-service
      - credential-store
      - admin-endpoint

individual_risk_categories: {}

risk_tracking: {}
