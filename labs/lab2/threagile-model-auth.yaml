threagile_version: 1.0.0

title: Juice Shop — Authentication Flow Threat Model
date: 2026-06-06

author:
  name: Student Name

business_criticality: important

tags_available:
  - auth
  - tokens
  - user
  - app
  - storage

management_summary_comment: >
  Focused threat model of the Juice Shop authentication flow:
  login, JWT issuance and signing, token verification on protected
  requests, and the admin-role-gated endpoint.

technical_overview:
  description: >
    Browser authenticates against the Auth API, which requests a signed JWT
    from a token-signing component. The browser then presents the JWT on
    protected and admin endpoints, where it is verified.
  images: []

data_assets:

  Credentials:
    id: credentials
    description: "Username and password submitted at login/registration."
    usage: business
    tags: ["auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Raw credentials; disclosure leads to account takeover."

  JWT Token:
    id: jwt-token
    description: "Signed JSON Web Token issued on successful login, presented on later requests."
    usage: business
    tags: ["tokens", "auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "A stolen or forged token grants authenticated access."

  JWT Signing Key:
    id: jwt-signing-key
    description: "Secret/private key used to sign and verify JWTs."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Lab Owner
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "If leaked, an attacker can forge valid tokens for any user."

  Session State:
    id: session-state
    description: "Authenticated user session state derived from the token."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: "Session hijacking allows impersonation of a logged-in user."

  Admin Operation Request:
    id: admin-request
    description: "Privileged operations requested against the admin endpoint."
    usage: business
    tags: ["auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: few
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Admin actions are high-impact; must be authorized and integral."

technical_assets:

  Browser:
    id: browser
    description: "End-user browser performing login and authenticated requests."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    size: system
    technology: browser
    tags: ["user"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Untrusted client, potentially an attacker."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Login / Register:
        target: auth-api
        description: "Browser submits credentials to authenticate or register."
        protocol: https
        authentication: credentials
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token
      Authenticated Request:
        target: api-endpoint
        description: "Browser calls protected API, sending JWT in Authorization header."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - session-state
        data_assets_received:
          - session-state
      Admin Request:
        target: admin-endpoint
        description: "Browser calls admin endpoint; JWT must carry admin role."
        protocol: https
        authentication: token
        authorization: enduser-identity-propagation
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - admin-request
        data_assets_received:
          - session-state

  Auth API:
    id: auth-api
    description: "Authentication endpoint: validates credentials, requests a JWT."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: service
    technology: web-service-rest
    tags: ["app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Handles raw credentials and triggers token issuance."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify Credentials:
        target: credential-store
        description: "Auth API checks submitted credentials against the user store."
        protocol: jdbc-encrypted
        authentication: credentials
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - credentials
      Request Token Signing:
        target: token-signer
        description: "Auth API asks the signer to mint a signed JWT."
        protocol: https
        authentication: client-certificate
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - session-state
        data_assets_received:
          - jwt-token

  Token Signer:
    id: token-signer
    description: "Component that signs and verifies JWTs using the signing key."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: component
    technology: identity-provider
    tags: ["auth"]
    internet: false
    machine: container
    encryption: transparent
    owner: Lab Owner
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Holds the signing key; compromise allows token forgery."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - jwt-signing-key
    data_assets_stored:
      - jwt-signing-key
    data_formats_accepted:
      - json

  Credential Store:
    id: credential-store
    description: "User credential database (hashed passwords)."
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: component
    technology: database
    tags: ["storage"]
    internet: false
    machine: container
    encryption: data-with-symmetric-shared-key
    owner: Lab Owner
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Stores all user credentials; primary account-takeover target."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored:
      - credentials
    data_formats_accepted: []

  API Endpoint:
    id: api-endpoint
    description: "Protected API that verifies the JWT on each request."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: service
    technology: web-service-rest
    tags: ["app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Serves protected resources; relies on token verification."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify Token:
        target: token-signer
        description: "API endpoint verifies the presented JWT signature with the signer."
        protocol: https
        authentication: client-certificate
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - session-state

  Admin Endpoint:
    id: admin-endpoint
    description: "Administrative endpoint requiring an admin-role JWT."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    size: service
    technology: web-service-rest
    tags: ["app"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: "High-privilege operations; elevation here is critical."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - admin-request
    data_assets_stored: []
    data_formats_accepted:
      - json

trust_boundaries:

  Internet:
    id: internet
    description: "Untrusted public network."
    type: network-cloud-provider
    tags: []
    technical_assets_inside:
      - browser
    trust_boundaries_nested:
      - container-network

  Container Network:
    id: container-network
    description: "Isolated container network hosting the auth components."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-signer
      - credential-store
      - api-endpoint
      - admin-endpoint
    trust_boundaries_nested: []

shared_runtimes: {}

individual_risk_categories: {}

risk_tracking: {}