threagile_version: 1.0.0

title: Juice Shop — Authentication Flow Threat Model
date: 2026-06-06

author:
  name: Mikhail Shumakov
  homepage: https://github.com/0xsmk

management_summary_comment: >
  Focused threat model on Juice Shop authentication flow: login, JWT issuance,
  session management, and access to admin endpoints.

business_criticality: critical

business_overview:
  description: >
    Models the authentication and authorization flow of OWASP Juice Shop.
    Covers credential submission, JWT token issuance, session handling,
    and admin endpoint access control.

technical_overview:
  description: >
    Browser submits credentials to Auth API. Auth API verifies against User DB
    and issues a JWT signed by Token Signer. Browser stores JWT and sends it
    with subsequent requests. Admin endpoints verify JWT contains admin role.

questions: {}
abuse_cases:
  JWT Forgery: >
    Attacker forges or tampers with JWT to gain admin privileges.
  Credential Brute Force: >
    Attacker attempts repeated logins to guess user passwords.
  SQL Injection on Login: >
    Attacker injects SQL into login form to bypass authentication.
  Privilege Escalation via JWT: >
    Attacker modifies JWT payload to elevate role to admin.

security_requirements:
  Strong JWT signing: Use RS256 or HS256 with a strong secret; validate signature on every request.
  Rate limiting on login: Prevent brute force with rate limiting and account lockout.
  Parameterized queries: Use prepared statements on all DB queries including login.
  Admin role verification: Server-side role check on every admin endpoint request.

tags_available:
  - browser
  - auth
  - jwt
  - api
  - db
  - admin
  - credentials
  - tokens
  - pii

data_assets:

  Credentials:
    id: credentials
    description: "Username and password submitted by user during login or registration."
    usage: business
    tags: ["auth", "pii"]
    origin: user-supplied
    owner: User
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Credentials are the primary authentication factor. Exposure leads to account takeover.

  JWT Token:
    id: jwt-token
    description: "JSON Web Token issued after successful login, used to authorize subsequent requests."
    usage: business
    tags: ["auth", "tokens"]
    origin: application
    owner: Juice Shop
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      JWT tokens grant access to protected resources. Tampering or theft enables session hijacking.

  JWT Signing Key:
    id: jwt-signing-key
    description: "Secret key used to sign and verify JWT tokens."
    usage: devops
    tags: ["auth", "tokens"]
    origin: application
    owner: Juice Shop
    quantity: very-few
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Compromise of the signing key allows forging arbitrary tokens including admin tokens.

  User Session State:
    id: user-session-state
    description: "Server-side session data and user identity context."
    usage: business
    tags: ["auth"]
    origin: application
    owner: Juice Shop
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      Session state links user identity to active requests; tampering enables impersonation.

  Admin Operation Requests:
    id: admin-operation-requests
    description: "Requests to admin endpoints (user management, challenge flags, config)."
    usage: business
    tags: ["admin", "auth"]
    origin: user-supplied
    owner: Admin User
    quantity: few
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Admin operations are privileged; unauthorized access leads to full application compromise.

technical_assets:

  Browser:
    id: browser
    description: "End-user web browser submitting credentials and carrying JWT."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["browser"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client controlled by end user — treat as untrusted."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
      - jwt-token
    data_assets_stored:
      - jwt-token
    data_formats_accepted:
      - json
    communication_links:
      Login Request:
        target: auth-api
        description: "Browser sends credentials to Auth API over HTTP (unauthenticated endpoint)."
        protocol: http
        authentication: none
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - jwt-token
      Authenticated API Request:
        target: auth-api
        description: "Browser sends JWT in Authorization header to access protected resources."
        protocol: http
        authentication: token
        authorization: enduser-identity-propagation
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - user-session-state
      Admin Endpoint Request:
        target: admin-endpoint
        description: "Browser requests admin operations with JWT containing admin role claim."
        protocol: http
        authentication: token
        authorization: enduser-identity-propagation
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - jwt-token
          - admin-operation-requests
        data_assets_received: []

  Auth API:
    id: auth-api
    description: "Juice Shop authentication endpoint handling login, registration, JWT issuance and verification."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-service-rest
    tags: ["api", "auth"]
    internet: false
    machine: container
    encryption: none
    owner: Juice Shop
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Central auth component — compromise leads to full account takeover."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - credentials
      - jwt-token
      - user-session-state
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify Credentials:
        target: user-db
        description: "Auth API queries User DB to verify submitted credentials. Uses string concatenation in SQL (no prepared statements)."
        protocol: jdbc
        authentication: token
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - credentials
        data_assets_received:
          - user-session-state
      Request JWT Signing:
        target: token-signer
        description: "Auth API requests Token Signer to sign a JWT payload after successful credential verification."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - user-session-state
        data_assets_received:
          - jwt-token

  Token Signer:
    id: token-signer
    description: "Component responsible for signing and verifying JWT tokens using the signing key."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["auth", "tokens"]
    internet: false
    machine: container
    encryption: none
    owner: Juice Shop
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Holds signing key — highest value target in the auth flow."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - jwt-signing-key
    data_assets_stored:
      - jwt-signing-key
    data_formats_accepted:
      - json
    communication_links: {}

  User DB:
    id: user-db
    description: "SQLite database storing user credentials and profile data."
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: database
    tags: ["db", "auth", "pii"]
    internet: false
    machine: virtual
    encryption: none
    owner: Juice Shop
    confidentiality: strictly-confidential
    integrity: critical
    availability: important
    justification_cia_rating: "Contains credential hashes and PII — primary target for SQL injection attacks."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - credentials
      - user-session-state
    data_assets_stored:
      - credentials
      - user-session-state
    data_formats_accepted:
      - file
    communication_links: {}

  Admin Endpoint:
    id: admin-endpoint
    description: "Privileged admin API endpoints (user management, challenge control, config)."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: web-service-rest
    tags: ["admin", "api"]
    internet: false
    machine: container
    encryption: none
    owner: Juice Shop
    confidentiality: internal
    integrity: critical
    availability: important
    justification_cia_rating: "Admin operations are privileged — unauthorized access causes full application compromise."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - jwt-token
      - admin-operation-requests
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Verify JWT for Admin:
        target: token-signer
        description: "Admin endpoint sends JWT to Token Signer for verification of signature and admin role claim."
        protocol: https
        authentication: token
        authorization: technical-user
        tags: []
        vpn: false
        ip_filtered: false
        readonly: true
        usage: business
        data_assets_sent:
          - jwt-token
        data_assets_received:
          - user-session-state

trust_boundaries:

  Internet:
    id: internet
    description: "Untrusted public network."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - browser
    trust_boundaries_nested:
      - container-network

  Container Network:
    id: container-network
    description: "Docker container network running Juice Shop auth components."
    type: network-dedicated-hoster
    tags: []
    technical_assets_inside:
      - auth-api
      - token-signer
      - user-db
      - admin-endpoint
    trust_boundaries_nested: []

shared_runtimes:
  Docker Host:
    id: docker-host
    description: "Docker engine running all Juice Shop auth containers."
    tags: []
    technical_assets_running:
      - auth-api
      - token-signer
      - admin-endpoint

individual_risk_categories: {}
risk_tracking: {}
