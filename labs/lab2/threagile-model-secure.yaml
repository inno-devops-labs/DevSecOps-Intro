threagile_version: 1.0.0

title: OWASP Juice Shop — Secure Variant (Lab 2)
date: 2026-06-12

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Hardened variant of the Juice Shop threat model for Lab 2.
  Changes: HTTPS enforced on all user-facing and internal links,
  database encrypted at rest, prepared statements declared,
  plain log writes removed from the app layer.

business_criticality: critical

business_overview:
  description: >
    Secure-variant training environment. All HTTP links upgraded to HTTPS,
    persistent storage encrypted at rest, and SQL injection mitigated via
    parameterized queries.
  images: []

technical_overview:
  description: >
    User browser connects via HTTPS only (direct or through reverse proxy).
    Internal proxy-to-app traffic is also HTTPS. Persistent storage is
    encrypted at rest. Application uses prepared statements for all DB access.
  images: []

questions:
  Do you expose port 3000 beyond localhost?: "No — HTTPS only"
  Do you use a reverse proxy with TLS and security headers?: "Yes"
  Are any outbound integrations (webhooks) configured?: "Yes — TLS"
  Is any sensitive data stored in logs or files?: "Logs removed from app; storage encrypted"

abuse_cases:
  Credential Stuffing / Brute Force: >
    Attackers attempt repeated login attempts to guess credentials or exhaust system resources.
  Stored XSS via Product Reviews: >
    Malicious scripts are inserted into product reviews, getting stored and executed in other users' browsers.
  SSRF via Outbound Requests: >
    Server-side requests (e.g. profile image URL fetch or WebHook callback) are abused to access internal network resources.

security_requirements:
  TLS in transit: Enforce HTTPS for all traffic including internal container-to-proxy links.
  Encryption at rest: Database and volume storage encrypted with symmetric key.
  Parameterized queries: All SQL operations use prepared statements to prevent injection.
  Secure headers: Add security headers (HSTS, CSP, X-Frame-Options, X-Content-Type-Options) at the proxy.
  Secrets management: Protect secret keys and credentials — keep them out of code repos and avoid logging them.

tags_available:
