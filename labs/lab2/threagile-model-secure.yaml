# =========================
# DATA ASSETS
# =========================
data_assets:

  User Profiles:
    id: user-profiles
    description: "User account details: password hashes, email addresses, profile info."
    usage: business
    tags: ["pii", "auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Contains personal identifiers and authentication secrets. Disclosure could violate privacy; integrity is essential to prevent account hijacking.

  Purchase History:
    id: purchase-history
    description: "Customer orders, shipping addresses, payment metadata (no full card numbers)."
    usage: business
    tags: ["pii"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      Includes personally identifiable information and transactional data. Must be protected from unauthorized disclosure or tampering.

  Product Listings:
    id: product-listings
    description: "Product attributes (names, descriptions, prices), publicly accessible."
    usage: business
    tags: ["public"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: public
    integrity: important
    availability: important
    justification_cia_rating: >
      Publicly visible; integrity is critical to avoid defacement or price manipulation.

  Session & Token Data:
    id: session-tokens
    description: "Session identifiers, JSON Web Tokens, CSRF protection tokens."
    usage: business
    tags: ["auth", "tokens"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      Compromised tokens allow session hijacking. Confidentiality and integrity are paramount.

  Event Logs:
    id: event-logs
    description: "Application logs and access traces (may unintentionally contain secrets or PII)."
    usage: devops
    tags: ["logs"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: >
      Intended for internal troubleshooting; exposure of sensitive data should be minimized.

# =========================
# TECHNICAL ASSETS
# =========================
technical_assets:

  Client Browser:
    id: client-browser
    description: "End user’s web browser."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["actor", "user"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client device is user‑controlled (may be malicious)."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      HTTPS to Proxy:
        target: reverse-proxy
        description: "Browser connects to reverse proxy over HTTPS (port 443)."
        protocol: https
        authentication: session-id
        authorization: enduser-identity-propagation
        tags: ["primary"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - session-tokens
        data_assets_received:
          - product-listings
      Direct HTTP to App:
        target: juice-shop
        description: "Browser directly accesses Juice Shop over HTTP (port 3000)."
        protocol: https
        authentication: session-id
        authorization: enduser-identity-propagation
        tags: ["direct"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - session-tokens
        data_assets_received:
          - product-listings

  Reverse Proxy (Optional):
    id: reverse-proxy
    description: "Optional reverse proxy (e.g., Nginx) handling TLS termination and injecting security headers."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: reverse-proxy
    tags: ["optional", "proxy"]
    internet: false
    machine: virtual
    encryption: transparent
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Not directly internet‑facing; enhances inbound security."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - product-listings
      - session-tokens
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      Forward to App:
        target: juice-shop
        description: "Proxy forwards requests to Juice Shop using HTTPS internally."
        protocol: https
        authentication: none
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - session-tokens
        data_assets_received:
          - product-listings

  Juice Shop Server:
    id: juice-shop
    description: "OWASP Juice Shop Node.js/Express server (v19.0.0). Uses parameterized queries/prepared statements."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-server
    tags: ["app", "nodejs"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Core application logic (intentionally vulnerable)."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - user-profiles
      - purchase-history
      - product-listings
      - session-tokens
    data_assets_stored:
      - event-logs
    data_formats_accepted:
      - json
    communication_links:
      Outbound Webhook:
        target: webhook-endpoint
        description: "Optional POST request to external webhook when a challenge is solved."
        protocol: https
        authentication: none
        authorization: none
        tags: ["egress"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - purchase-history

  Persistent Volume:
    id: persistent-volume
    description: "Host‑mounted storage for SQLite database, uploaded content, and logs."
    type: datastore
    usage: devops
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: component
    technology: file-server
    tags: ["storage", "volume"]
    internet: false
    machine: virtual
    encryption: data-with-symmetric-shared-key
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Local disk volume; contains database, uploads, logs – sensitive if accessed."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored:
      - event-logs
      - user-profiles
      - purchase-history
      - product-listings
