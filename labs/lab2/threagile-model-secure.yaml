threagile_version: 1.0.0

title: OWASP Juice Shop — Secure Variant Threat Model
date: 2025-09-18

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Hardened variant of the local OWASP Juice Shop model. All browser and proxy
  traffic uses TLS, outbound callbacks use HTTPS, and the persistent database
  and logs are encrypted at rest. Database access uses an encrypted channel,
  a dedicated technical identity, and parameterized queries.

business_criticality: important

business_overview:
  description: >
    Training environment for DevSecOps. This secure variant applies low-cost
    transport, storage, and database-query hardening to the baseline model.
  images: []

technical_overview:
  description: >
    A user's web browser connects to Juice Shop directly or through a reverse
    proxy using HTTPS. Proxy-to-application and outbound WebHook traffic also
    use TLS. Application data is written to encrypted persistent storage over
    an encrypted database channel using parameterized queries.
  images: []

questions:
  Do you expose port 3000 beyond localhost?: "Only through HTTPS."
  Do you use a reverse proxy with TLS and security headers?: "Yes."
  Are any outbound integrations (webhooks) configured?: "Optional; HTTPS only."
  Is any sensitive data stored in logs or files?: "Sensitive data is minimized and storage is encrypted."

abuse_cases:
  Credential Stuffing / Brute Force: >
    Attackers attempt repeated login attempts to guess credentials or exhaust system resources.
  Stored XSS via Product Reviews: >
    Malicious scripts are inserted into product reviews, getting stored and executed in other users' browsers.
  SSRF via Outbound Requests: >
    Server-side requests are abused to access internal network resources.

security_requirements:
  TLS in transit: Enforce HTTPS for all user, proxy, and outbound integration traffic.
  AuthZ on sensitive routes: Implement strict server-side authorization checks on sensitive functionality.
  Rate limiting & lockouts: Apply rate limiting and account lockout policies.
  Secure headers: Add HSTS, CSP, X-Frame-Options, and X-Content-Type-Options.
  Secrets management: Protect secret keys and credentials and avoid logging them.
  Encrypted storage: Encrypt database files, uploads, and logs at rest.
  Parameterized queries: Use prepared statements for all database access.

