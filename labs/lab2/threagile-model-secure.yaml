    description: "Third‑party webhook endpoint (optional integration for challenge notifications)."
    type: external-entity
    usage: business
    used_as_client_by_human: false
    out_of_scope: true
    justification_out_of_scope: "External service not managed by us."
    size: system
    technology: web-service-rest
    tags: ["saas", "webhook"]
    internet: true
    machine: virtual
    encryption: none
    owner: Third-Party
    confidentiality: internal
    integrity: operational
