    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client controlled by the end user."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      To Reverse Proxy:
        target: reverse-proxy
        description: "User browser to reverse proxy using HTTPS on port 443."
        protocol: https
        authentication: session-id
        authorization: enduser-identity-propagation
