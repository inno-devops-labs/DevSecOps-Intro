    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Local disk storage for the container – encrypted at rest to protect sensitive data (database and logs)."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored:
      - logs
      - user-accounts
      - orders
      - product-catalog
