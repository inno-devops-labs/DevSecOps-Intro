  - primary
  - direct
  - egress

data_assets:

  User Accounts:
    id: user-accounts
    description: "User profile data, credential hashes, emails."
    usage: business
    tags: ["pii", "auth"]
    origin: user-supplied
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: >
      Contains personal identifiers and authentication data. High confidentiality is required to protect user privacy, and integrity is critical to prevent account takeovers.

  Orders:
    id: orders
    description: "Order history, addresses, and payment metadata (no raw card numbers)."
    usage: business
    tags: ["pii"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      Contains users' personal data and business transaction records. Integrity and confidentiality are important to prevent fraud or privacy breaches.

  Product Catalog:
    id: product-catalog
    description: "Product information (names, descriptions, prices) available to all users."
    usage: business
    tags: ["public"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: public
    integrity: important
    availability: important
    justification_cia_rating: >
      Product data is intended to be public, but its integrity is important (to avoid defacement or price manipulation that could mislead users).

  Tokens & Sessions:
    id: tokens-sessions
    description: "Session identifiers, JWTs for authenticated sessions, CSRF tokens."
    usage: business
    tags: ["auth", "tokens"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: important
    justification_cia_rating: >
      If session tokens are compromised, attackers can hijack user sessions. They must be kept confidential and intact; availability is less critical (tokens can be reissued).

  Logs:
    id: logs
    description: "Application and access logs (may inadvertently contain PII or secrets)."
    usage: devops
    tags: ["logs"]
    origin: application
    owner: Lab Owner
    quantity: many
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: >
      Logs are for internal use (troubleshooting, monitoring). They should not be exposed publicly, and sensitive data should be sanitized to protect confidentiality.

technical_assets:

  User Browser:
    id: user-browser
    description: "End-user web browser (client)."
    type: external-entity
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    justification_out_of_scope:
    size: system
    technology: browser
    tags: ["actor", "user"]
    internet: true
    machine: virtual
    encryption: none
    owner: External User
    confidentiality: public
    integrity: operational
    availability: operational
    justification_cia_rating: "Client controlled by end user (potentially an attacker)."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      To Reverse Proxy (preferred):
        target: reverse-proxy
        description: "User browser to reverse proxy (HTTPS on 443)."
        protocol: https
        authentication: session-id
        authorization: enduser-identity-propagation
        tags: ["primary"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - tokens-sessions
        data_assets_received:
          - product-catalog
      Direct to App (no proxy):
        target: juice-shop
        description: "Direct browser access to app (HTTPS on 3000)."
        protocol: https
        authentication: session-id
        authorization: enduser-identity-propagation
        tags: ["direct"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - tokens-sessions
        data_assets_received:
          - product-catalog

  Reverse Proxy:
    id: reverse-proxy
    description: "Optional reverse proxy (e.g., Nginx) for TLS termination and adding security headers."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: reverse-proxy
    tags: ["optional", "proxy"]
    internet: false
    machine: virtual
    encryption: transparent
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "Not exposed to internet directly; improves security of inbound traffic."
    multi_tenant: false
    redundant: false
    custom_developed_parts: false
    data_assets_processed:
      - product-catalog
      - tokens-sessions
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      To App:
        target: juice-shop
        description: "Proxy forwarding to app (HTTPS on 3000 internally)."
        protocol: https
        authentication: none
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - tokens-sessions
        data_assets_received:
          - product-catalog

  Juice Shop Application:
    id: juice-shop
    description: "OWASP Juice Shop server (Node.js/Express, v19.0.0)."
    type: process
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    justification_out_of_scope:
    size: application
    technology: web-server
    tags: ["app", "nodejs"]
    internet: false
    machine: container
    encryption: none
    owner: Lab Owner
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: "In-scope web application (contains all business logic and vulnerabilities by design)."
    multi_tenant: false
    redundant: false
    custom_developed_parts: true
    data_assets_processed:
      - user-accounts
      - orders
      - product-catalog
      - tokens-sessions
    data_assets_stored: []
    data_formats_accepted:
      - json
    communication_links:
      To Challenge WebHook:
        target: webhook-endpoint
        description: "Optional outbound callback (HTTPS POST) to external WebHook when a challenge is solved."
        protocol: https
        authentication: none
        authorization: none
        tags: ["egress"]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - orders
      To Database:
        target: persistent-storage
        description: "Application uses parameterized queries / prepared statements for all SQL operations"
        protocol: jdbc-encrypted
        authentication: credentials
        authorization: none
        tags: []
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - user-accounts
          - orders
        data_assets_received: []

  Persistent Storage:
