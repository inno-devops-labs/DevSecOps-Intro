threagile_version: 1.0.0

title: OWASP Juice Shop — Local Deployment Risk Assessment
date: 2025-10-05

author:
  name: Student Name
  homepage: https://example.edu

management_summary_comment: >
  Risk assessment for a locally deployed OWASP Juice Shop instance.
  Users can reach the application directly over HTTP on port 3000 or via an
  optional reverse proxy that provides TLS termination and security headers.
  The application runs inside a container and persists data (database, file uploads,
  logs) to a host-mounted directory. Outbound notifications (e.g., webhook for challenge
  events) are optionally supported.

business_criticality: important

business_overview:
  description: >
    A deliberately vulnerable training environment for DevSecOps practices.
    This model focuses on a minimal local architecture, STRIDE-based threat analysis,
    and practical mitigations for the identified risks.

  images: []

technical_overview:
  description: >
    A client browser connects to the Juice Shop server (Node.js/Express) either
    directly on **localhost:3000** (plain HTTP) or through a **reverse proxy**
    listening on ports 80/443 (HTTPS). The server may make outbound calls to
    external services (e.g., a configured **WebHook** for challenge completion events).
    All runtime data (SQLite database, uploaded files, logs) is stored on the host
    via a bind-mounted volume. Major trust boundaries include **Internet** (users
    and external services) → **Host** (local machine/VM) → **Container Network**
    (isolated container environment).

questions:
  Is the direct HTTP port exposed beyond localhost?: ""
  Is a reverse proxy with TLS enabled?: ""
  Are any outbound webhooks configured?: ""
  Is sensitive information written to logs or files?: ""

abuse_cases:
  Credential Brute Force: >
    An attacker launches repeated login attempts to guess user credentials or cause resource exhaustion.
  Persistent XSS via Product Comments: >
    Malicious JavaScript is injected into product reviews and later executed in other users' browsers.
  SSRF Exploitation: >
    The application’s outbound requests (e.g., fetching profile images or calling webhooks) are abused to probe internal network services.

security_requirements:
  Enforce TLS for transit: Use a TLS-terminating reverse proxy for all user-facing traffic, employing strong cipher suites and proper certificate management.
  Server-side authorization: Implement robust server-side access controls for sensitive administrative functions.
  Rate limiting and lockout: Apply rate limiting and account lockout policies to mitigate automated attacks on authentication endpoints.
  Security headers: Configure security headers (HSTS, CSP, X-Frame-Options, X-Content-Type-Options) at the proxy or application level.
  Secrets management: Keep secret keys (JWT signing keys, API credentials) out of version control and avoid logging them.

