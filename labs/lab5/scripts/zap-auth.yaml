env:
  contexts:
    - name: juice-context
      urls:
        - http://localhost:3000
      includePaths:
        - http://localhost:3000.*
      authentication:
        method: json
        parameters:
          loginPageUrl: http://localhost:3000/#/login
          loginRequestUrl: http://localhost:3000/rest/user/login
          loginRequestBody: '{"email":"{%username%}","password":"{%password%}"}'
        verification:
          method: response
          loggedInRegex: '"authentication"'
          loggedOutRegex: '"error"'
      sessionManagement:
        method: cookie
      users:
        - name: admin-user
          credentials:
            username: admin@juice-sh.op
            password: admin123
  parameters:
    failOnError: false
    failOnWarning: false

jobs:
  - type: spider
    parameters:
      context: juice-context
      user: admin-user
      url: http://localhost:3000
      maxDuration: 10

  - type: spiderAjax
    parameters:
      context: juice-context
      user: admin-user
      url: http://localhost:3000
      maxDuration: 20

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk/zap
      reportFile: report-auth.html

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk/zap
      reportFile: zap-report-auth.json
