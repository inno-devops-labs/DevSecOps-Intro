# ZAP Automation Framework - Authenticated scan for OWASP Juice Shop
# Authentication: JSON login with admin credentials
# Session: Cookie-based (JWT in response, sent in Authorization header or cookie)
env:
  contexts:
    - name: "juice-shop"
      urls:
        - "http://localhost:3000"
      authentication:
        method: "json"
        parameters:
          loginRequestUrl: "http://localhost:3000/rest/user/login"
          loginRequestBody: '{"email":"admin@juice-sh.op","password":"admin123"}'
        verification:
          method: "response"
          loggedInRegex: "authentication"
      sessionManagement:
        method: "cookie"
      users:
        - name: "admin"
          credentials:
            username: "admin@juice-sh.op"
            password: "admin123"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: spider
    parameters:
      context: "juice-shop"
      user: "admin"
  - type: spiderAjax
    parameters:
      context: "juice-shop"
      user: "admin"
      maxDuration: 10
  - type: passiveScan-wait
  - type: activeScan
    parameters:
      context: "juice-shop"
      user: "admin"
  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "report-auth.html"
