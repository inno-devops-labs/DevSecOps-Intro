metadata:
  id: CKV2_CUSTOM_1
  name: "RDS instance must have IAM database authentication enabled"
  category: "ENCRYPTION"
  severity: HIGH

definition:
  and:
    - cond_type: "attribute"
      resource_types:
        - "aws_db_instance"
      attribute: "iam_database_authentication_enabled"
      operator: "equals"
      value: true