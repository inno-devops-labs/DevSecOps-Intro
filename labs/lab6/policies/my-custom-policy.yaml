metadata:
  id: "CKV2_CUSTOM_1"
  name: "Ensure RDS instances have IAM database authentication enabled"
  category: "IAM"
  severity: "HIGH"
definition:
  and:
    - cond_type: "filter"
      attribute: "resource_type"
      value:
        - "aws_db_instance"
      operator: "within"
    - cond_type: "attribute"
      resource_types:
        - "aws_db_instance"
      attribute: "iam_database_authentication_enabled"
      operator: "equals"
      value: true
