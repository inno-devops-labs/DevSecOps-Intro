metadata:
  id: CKV2_CUSTOM_1
  name: "Ensure S3 bucket has lifecycle configuration"
  category: "GENERAL_SECURITY"
  severity: MEDIUM
definition:
  and:
    - cond_type: filter
      attribute: resource_type
      value:
        - aws_s3_bucket
      operator: within
    - cond_type: attribute
      attribute: lifecycle_rule
      resource_types:
        - aws_s3_bucket
      operator: exists
      value: true
