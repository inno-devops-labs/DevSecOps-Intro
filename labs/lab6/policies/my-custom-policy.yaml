metadata:
  id: CKV2_CUSTOM_1
  name: "Ensure S3 bucket has lifecycle configuration"
  category: "GENERAL_SECURITY"
  severity: "MEDIUM"

scope:
  provider: aws

definition:
  and:
    - cond_type: "filter"
      resource_types:
        - "aws_s3_bucket"
      attribute: "resource_type"
      operator: "within"
      value:
        - "aws_s3_bucket"
    - cond_type: "connection"
      resource_types:
        - "aws_s3_bucket"
      connected_resource_types:
        - "aws_s3_bucket_lifecycle_configuration"
      operator: "exists"
