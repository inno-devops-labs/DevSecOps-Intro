apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: juice-shop
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      serviceAccountName: juice-shop-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: juice-shop
        image: bkimminich/juice-shop:v20.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /usr/src/app/logs
        - name: data
          mountPath: /usr/src/app/data
        - name: frontend
          mountPath: /usr/src/app/frontend/dist
        - name: i18n
          mountPath: /usr/src/app/i18n
        - name: uploads
          mountPath: /usr/src/app/uploads
        - name: app-tmp
          mountPath: /usr/src/app/tmp
        - name: ftp
          mountPath: /juice-shop/ftp
        - name: juice-data
          mountPath: /juice-shop/data
        - name: juice-db
          mountPath: /juice-shop/data/db
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: data
        emptyDir: {}
      - name: frontend
        emptyDir: {}
      - name: i18n
        emptyDir: {}
      - name: uploads
        emptyDir: {}
      - name: app-tmp
        emptyDir: {}
      - name: ftp
        emptyDir: {}
      - name: juice-data
        emptyDir: {}
      - name: juice-db
        emptyDir: {}