apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juice-shop-netpol
  namespace: juice-shop
spec:
  podSelector:
    matchLabels:
      app: juice-shop
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
      
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
  - ports:
    - protocol: TCP
      port: 443
