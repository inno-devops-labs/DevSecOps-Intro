apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-no-resources
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: unbounded-app
      image: alpine:3.20
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
